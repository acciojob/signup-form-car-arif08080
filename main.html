<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
		<h2>Signup form</h2>
	<form>
		<lable for="name">Name:</lable> <br>
		<input type="text" id="name" placeholder="Write your name" required> <br><br>
		<lable for="email">Email:</lable> <br>
		<input type="text" id="email" placeholder="Write your email" required> <br><br>
		<label>Gender:</label><br>
        <input type="radio" id="gender_m" name="gender" required>
		<label for="gender_m">Male</label>
        <input type="radio" id="gender_f" name="gender" required>
        <label for="gender_f">Female</label><br><br>
		<label for="cars">Car Brands:</label><br>
        <select id="cars" required>
            <option value="" disabled selected>--Please choose an option--</option>
            <option value="toyota">Toyota</option>
            <option value="honda">Honda</option>
            <option value="ford">Ford</option>
        </select><br><br>

        <label for="age">Age:</label><br>
        <input type="number" id="age" placeholder="Age" required><br><br>

        <label for="dob">DOB:</label><br>
        <input type="date" id="dob" required><br><br>

        <label for="tel">Phone Number:</label><br>
        <input type="tel" id="tel" placeholder="xxx-xxx-xxxx"><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" placeholder="Password" required><br><br>

        <input type="checkbox" id="tos" required>
        <label for="tos">I agree to the TOS</label><br><br>

        <button type="submit">Submit</button>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
